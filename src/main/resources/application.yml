spring:
  application:
    name: medical-store-pos

  datasource:
    url: jdbc:postgresql://postgres:5432/medical_store_pos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          time_zone: America/Lima
        order_inserts: true
        order_updates: true

  security:
    jwt:
      secret: MedicalStorePOSSecretKeyForJWTTokenGeneration2024Production
      expiration: 86400000

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.medicalstore: INFO
    org.springframework.security: DEBUG
