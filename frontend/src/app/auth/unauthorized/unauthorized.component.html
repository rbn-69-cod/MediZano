<div class="unauthorized-screen">
  <div class="unauthorized-container">
    <div class="unauthorized-content">
      <svg-icon name="error" class="error-icon" [size]="80"></svg-icon>
      <h1 class="error-title">Acceso restringido</h1>
      <p class="error-message">
        Tu usuario no tiene permiso para ingresar a esta sección.
      </p>
      <p class="error-submessage">
        Si necesitas acceso, comunícate con el administrador.
      </p>
      <button class="btn-go-home" (click)="goHome()">
        <svg-icon name="billing" class="btn-icon" [size]="18"></svg-icon>
        <span>Ir a mi inicio</span>
      </button>
    </div>
  </div>
</div>
