<div class="app-shell">
  <!-- Sidebar -->
  <aside 
    class="sidebar"
  >
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="9" y="3" width="6" height="18" rx="2" fill="currentColor"/>
          <rect x="3" y="9" width="18" height="6" rx="2" fill="currentColor"/>
        </svg>
        <span class="logo-text">MediZano Botica</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of visibleNavItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [class.active]="isActive(item.route)"
        class="nav-item"
        [attr.aria-label]="item.label"
      >
        <svg-icon [name]="item.icon" class="nav-icon"></svg-icon>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-menu">
        <div class="user-avatar">
          <svg-icon name="user" class="avatar-icon"></svg-icon>
        </div>
        <div class="user-info">
          <div class="user-name" *ngIf="authService.currentUser$ | async as user">
            {{ user.fullName || user.username }}
          </div>
          <div class="user-role" *ngIf="authService.currentUser$ | async as user">
            {{ getRoleLabel(user.role) }}
          </div>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()" [attr.aria-label]="'Cerrar sesión'">
        <svg-icon name="logout" class="logout-icon"></svg-icon>
        <span class="logout-text">Salir</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
